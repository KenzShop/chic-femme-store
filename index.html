<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Femme Store</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdfbfb; }
        .font-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const CONFIG = {
            nomBoutique: "CHIC FEMME STORE",
            whatsapp: "212669630039", // Votre numéro corrigé
            produits: [
                { id: 1, img: "https://i.ibb.co/vnn80QK/image.jpg" },
                { id: 2, img: "https://i.ibb.co/xqCTVZP9/image.jpg" },
                { id: 3, img: "https://i.ibb.co/7JGTnwYt/image.jpg" },
                { id: 4, img: "https://i.ibb.co/zVVr6VY0/image.jpg" },
                { id: 5, img: "https://i.ibb.co/ynPHN5V2/image.jpg" },
                { id: 6, img: "https://i.ibb.co/hJX5j3CV/image.jpg" },
                { id: 7, img: "https://i.ibb.co/KjRKXL4k/image.jpg" },
                { id: 8, img: "https://i.ibb.co/SX6L9kZD/image.jpg" },
                { id: 9, img: "https://i.ibb.co/LdtvWGhK/image.jpg" },
                { id: 10, img: "https://i.ibb.co/m5GpGp6D/image.jpg" },
                { id: 11, img: "https://i.ibb.co/8gw83pPs/image.jpg" },
                { id: 12, img: "https://i.ibb.co/j9VW2k2N/image.jpg" },
                { id: 13, img: "https://i.ibb.co/spgRbJkR/image.jpg" },
                { id: 14, img: "https://i.ibb.co/WvRRB8Pc/image.jpg" },
                { id: 15, img: "https://i.ibb.co/KpqwfdK8/image.jpg" },
                { id: 16, img: "https://i.ibb.co/Ld2ZxVtT/image.jpg" },
                { id: 17, img: "https://i.ibb.co/Y4X0FRY1/image.jpg" },
                { id: 18, img: "https://i.ibb.co/hpmYyVY/image.jpg" },
                { id: 19, img: "https://i.ibb.co/Z1VsRQgh/image.jpg" },
                { id: 20, img: "https://i.ibb.co/B2qXRfTJ/image.jpg" }
            ]
        };

        function App() {
            return (
                <div className="min-h-screen">
                    <header className="bg-white border-b p-6 text-center">
                        <h1 className="font-title text-3xl text-gray-900 tracking-wider">{CONFIG.nomBoutique}</h1>
                        <p className="text-gray-500 mt-2">Nouvelle Collection • Livraison partout au Maroc</p>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
                            {CONFIG.produits.map((p) => (
                                <div key={p.id} className="bg-white rounded-xl shadow-sm overflow-hidden border">
                                    <img src={p.img} alt={`Modèle ${p.id}`} className="w-full h-auto object-cover" />
                                    <div className="p-4">
                                        <a 
                                            href={`https://wa.me/${CONFIG.whatsapp}?text=Bonjour, je souhaite commander ce modèle (Photo ${p.id})`}
                                            className="block w-full bg-green-500 hover:bg-green-600 text-white text-center py-2 rounded-lg font-semibold transition-colors"
                                        >
                                            Commander WhatsApp
                                        </a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="text-center py-12 text-gray-400 border-t mt-12">
                        &copy; 2026 {CONFIG.nomBoutique}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
